      name: "Arcane Trickster: 3rd-level spells"
      tag: spellcasting
      points: 5        # PLACEHOLDER
      upgrades: at-spell-tier-2nd
    - id: versatile-trickster
      name: "Arcane Trickster: Versatile Trickster"
      tag: utility
      points: 3        # PLACEHOLDER
  17:
    - id: spell-thief
      name: "Arcane Trickster: Spell Thief"
