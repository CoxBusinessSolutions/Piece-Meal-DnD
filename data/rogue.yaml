# Piece-Meal-DnD — Rogue
#
# The source of truth for the Rogue class. Each level lists the "pieces" you
# gain at that level, tagged and weighted in "power points". The pricer
# (tools/price.py) turns points into XP prices by dividing each level's XP cost
# among its pieces in proportion to their points, so the prices always
# reconcile back to the official SRD XP thresholds below.
#
# Tune the economy by editing `points` on individual pieces (or the rubric
# defaults). Do NOT hand-edit XP prices — they are derived. Re-run the pricer
# after any change to re-balance and confirm everything still reconciles.

class: Rogue
source: "SRD 5.1 (CC-BY-4.0)"
hit_die: d8

# Official SRD experience thresholds (cumulative XP to BE this level).
# The cost to EARN a level is the delta from the previous threshold; the pricer
# derives that itself, so this table is the single anchor.
xp_thresholds:
  1: 0
  2: 300
  3: 900
  4: 2700
  5: 6500
  6: 14000
  7: 23000
  8: 34000
  9: 48000
  10: 64000
  11: 85000
  12: 100000
  13: 120000
  14: 140000
  15: 165000
  16: 195000
  17: 225000
  18: 265000
  19: 305000
  20: 355000

# Rubric: default power-points per piece category. Documented here for
# reference; each piece carries its own explicit `points` so you can override
# any single piece without touching the category.
rubric:
  ribbon: 1          # pure flavor / narrow utility (Thieves' Cant)
  proficiency: 2     # proficiency-bonus bumps, minor passives
  hp: 2              # the always-on hit die / HP gained every level
  utility: 3         # situational active abilities
  scaling: 3         # an upgrade tier on an existing feature (Sneak Attack +1d6)
  asi: 4             # Ability Score Improvement / Feat
  marquee: 5         # headline combat / defense features

# Levels. Every piece has a stable `id` (usable as a shop SKU), a `tag` drawn
# from the rubric, and `points`. Upgrade-pieces reference the piece they build
# on via `upgrades`, forming a buy-in-sequence chain.
levels:
  1:
    # Character creation: spend the 100-experience budget. Commodities are
    # priced from data/level1_catalog.yaml; the unique features (Sneak Attack,
    # Expertise, Thieves' Cant) split whatever is left.
    note: Character-creation budget (100 experience); earned XP starts at 0 in play.
    pieces:
      # --- Commodities (fixed catalog price, shared across classes) ---
      - id: save-dex
        name: "Saving Throw Proficiency: Dexterity"
        commodity: save
      - id: save-int
        name: "Saving Throw Proficiency: Intelligence"
        commodity: save
      - id: skills-1
        name: "Skill Proficiencies (choose 4)"
        commodity: skill
        qty: 4
      - id: hit-die-1
        name: "Hit Die (d8)"
        commodity: hit_die
        variant: d8
      - id: armor-1
        name: "Armor Proficiency: light"
        commodity: armor
        tiers: [light]
      - id: weapons-1
        name: "Weapons: simple + hand crossbows, longswords, rapiers, shortswords"
        commodity: weapon
        tier: simple_plus_few_martial
      - id: tools-1
        name: "Tool Proficiency: thieves' tools"
        commodity: tool
        qty: 1
      - id: starting-kit-1
        name: "Starting Equipment Package"
        commodity: starting_kit
      # --- Unique features (split the remaining budget by points) ---
      - id: sneak-attack-1d6
        name: "Sneak Attack (1d6)"
        tag: marquee
        points: 5
      - id: expertise-1
        name: "Expertise (first pair)"
        tag: marquee
        points: 5
      - id: thieves-cant
        name: "Thieves' Cant"
        tag: ribbon
        points: 1
  2:
