# Piece-Meal-DnD — Monk (Way of the Open Hand)
#
# Pure martial with a resource system: Ki (Flurry of Blows, Patient Defense,
# Step of the Wind) is one buyable piece, and the Martial Arts die growth
# (d4 -> d6 -> d8 -> d10) is an upgrade-chain. Like the Wizard/Warlock, the Monk
# carries a very light commodity load (no armor, d8, simple weapons), so most of
# its 100 flows into Martial Arts.

class: Monk
subclass: Way of the Open Hand
source: "SRD 5.1 (CC-BY-4.0)"
hit_die: d8
caster: none

xp_thresholds:
  1: 0
  2: 300
  3: 900
  4: 2700
  5: 6500
  6: 14000
  7: 23000
  8: 34000
  9: 48000
  10: 64000
  11: 85000
  12: 100000
  13: 120000
  14: 140000
  15: 165000
  16: 195000
  17: 225000
  18: 265000
  19: 305000
  20: 355000

rubric:
  ribbon: 1
  proficiency: 2
  hp: 2
  utility: 3
  scaling: 3
  asi: 4
  marquee: 5

levels:
  1:
    note: Character-creation budget (100 experience); earned XP starts at 0 in play.
    pieces:
      # --- Commodities (fixed catalog price, shared across classes) ---
