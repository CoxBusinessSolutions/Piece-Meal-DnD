        name: "Saving Throw Proficiency: Strength"
        commodity: save
      - id: save-dex
        name: "Saving Throw Proficiency: Dexterity"
        commodity: save
      - id: skills-1
        name: "Skill Proficiencies (choose 2)"
        commodity: skill
        qty: 2
      - id: hit-die-1
        name: "Hit Die (d8)"
        commodity: hit_die
        variant: d8
      - id: armor-1
        name: "Armor Proficiency: none"
        commodity: armor
        tiers: []
      - id: weapons-1
        name: "Weapons: simple + shortswords"
        commodity: weapon
        tier: simple
      - id: tools-1
        name: "Tool Proficiency: one artisan's tool or instrument"
        commodity: tool
        qty: 1
      - id: starting-kit-1
        name: "Starting Equipment Package"
