# Piece-Meal-DnD — Warlock (The Fiend)
#
# PACT MAGIC — a third caster shape. Instead of a full spell-slot table, the
# Warlock has a handful of short-rest slots that all rise to the same level:
# 1st@1, 2nd@3, 3rd@5, 4th@7, 5th@9, then the slot LEVEL stops and only the
# COUNT grows (a 4th slot at 18, modeled as a `slots` piece). High-level spells
# come from Mystic Arcanum (a free 6th/7th/8th/9th spell at 11/13/15/17), each
# a spellcasting piece chained to the last. Eldritch Invocations are their own
# buyable system: the first pick unlocks the feature, later picks are scaling
# upgrade-pieces at every level the invocations-known count rises.

class: Warlock
subclass: The Fiend
source: "SRD 5.1 (CC-BY-4.0)"
hit_die: d8
caster: pact

xp_thresholds:
  1: 0
  2: 300
  3: 900
  4: 2700
  5: 6500
  6: 14000
  7: 23000
  8: 34000
  9: 48000
  10: 64000
  11: 85000
  12: 100000
  13: 120000
  14: 140000
  15: 165000
  16: 195000
  17: 225000
  18: 265000
  19: 305000
  20: 355000

