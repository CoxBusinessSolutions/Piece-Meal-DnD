# Piece-Meal-DnD — Bard (BASE chassis; subclasses in data/subclasses/bard/)
#
# Full caster (spells from level 1, new tier every odd level to 9th). Rich in
# scaling dials modeled as upgrade-chains: Bardic Inspiration die (d6->d12),
# Song of Rest die (d6->d12), and Expertise. College of Lore adds Cutting Words
# and the extra Magical Secrets picks.

class: Bard
source: "SRD 5.1 (CC-BY-4.0)"
hit_die: d8
caster: full

xp_thresholds:
  1: 0
  2: 300
  3: 900
  4: 2700
  5: 6500
  6: 14000
  7: 23000
  8: 34000
  9: 48000
  10: 64000
  11: 85000
  12: 100000
  13: 120000
  14: 140000
  15: 165000
  16: 195000
  17: 225000
  18: 265000
  19: 305000
  20: 355000

rubric:
  ribbon: 1
  proficiency: 2
  hp: 2
  utility: 3
  scaling: 3
  slots: 3
  asi: 4
  marquee: 5
  spellcasting: 5

levels:
  1:
    note: Character-creation budget (100 experience); earned XP starts at 0 in play.
    pieces:
      # --- Commodities (fixed catalog price, shared across classes) ---
      - id: save-dex
        name: "Saving Throw Proficiency: Dexterity"
        commodity: save
      - id: save-cha
        name: "Saving Throw Proficiency: Charisma"
        commodity: save
      - id: skills-1
        name: "Skill Proficiencies (choose 3)"
        commodity: skill
        qty: 3
      - id: hit-die-1
        name: "Hit Die (d8)"
        commodity: hit_die
        variant: d8
      - id: armor-1
        name: "Armor Proficiency: light"
        commodity: armor
        tiers: [light]
      - id: weapons-1
        name: "Weapons: simple + hand crossbows, longswords, rapiers, shortswords"
        commodity: weapon
        tier: simple_plus_few_martial
      - id: tools-1
        name: "Tool Proficiencies: three musical instruments"
        commodity: tool
        qty: 3
      - id: starting-kit-1
        name: "Starting Equipment Package"
        commodity: starting_kit
      # --- Unique features (split the remaining budget by points) ---
      - id: spellcasting
        name: "Spellcasting (1st-level spells)"
        tag: spellcasting
        points: 5
      - id: bardic-inspiration
        name: "Bardic Inspiration (d6)"
