# Piece-Meal-DnD — Fighter (BASE chassis)
#
# The pure-martial archetype. This file is the CLASS BASE only: commodities,
# Fighting Style, Second Wind, Action Surge, Extra Attack, Indomitable, ASIs,
# proficiency bumps, and HP. It carries NO subclass (martial-archetype) features.
#
# Martial-archetype features live in data/subclasses/fighter/<name>.yaml and are
# spliced onto this base at levels 3/7/10/15/18 by:
#   tools/price.py  data/fighter.yaml --subclass data/subclasses/fighter/champion.yaml
#   tools/build_web.py  (auto-merges the default subclass)
#
# Fighter carries the most commodity load at level 1 (all armor + shields, all
# weapons, a d10 body), so LESS of its 100 is left for signature features — but
# those two features (Fighting Style, Second Wind) each end up worth a lot. All
# martial archetypes share this identical level-1 chassis.

class: Fighter
source: "SRD 5.1 (CC-BY-4.0)"
hit_die: d10
caster: none

xp_thresholds:
  1: 0
  2: 300
  3: 900
  4: 2700
  5: 6500
  6: 14000
  7: 23000
  8: 34000
  9: 48000
  10: 64000
  11: 85000
  12: 100000
  13: 120000
  14: 140000
  15: 165000
  16: 195000
  17: 225000
  18: 265000
  19: 305000
  20: 355000

rubric:
  ribbon: 1
  proficiency: 2
  hp: 2
  utility: 3
  scaling: 3
  asi: 4
  marquee: 5
  spellcasting: 5

levels:
  1:
    # Character creation: spend the 100-experience budget. Commodities are
    # priced from data/level1_catalog.yaml; Fighting Style and Second Wind split
    # whatever is left.
    note: Character-creation budget (100 experience); earned XP starts at 0 in play.
    pieces:
      # --- Commodities (fixed catalog price, shared across classes) ---
      - id: save-str
        name: "Saving Throw Proficiency: Strength"
        commodity: save
      - id: save-con
        name: "Saving Throw Proficiency: Constitution"
        commodity: save
      - id: skills-1
        name: "Skill Proficiencies (choose 2)"
        commodity: skill
        qty: 2
      - id: hit-die-1
        name: "Hit Die (d10)"
        commodity: hit_die
        variant: d10
      - id: armor-1
        name: "Armor Proficiency: all armor + shields"
        commodity: armor
        tiers: [light, medium, heavy, shield]
      - id: weapons-1
        name: "Weapons: simple + martial"
        commodity: weapon
        tier: simple_and_martial
      - id: starting-kit-1
        name: "Starting Equipment Package"
        commodity: starting_kit
      # --- Unique features (split the remaining budget by points) ---
      - id: fighting-style
        name: "Fighting Style"
        tag: marquee
        points: 5
      - id: second-wind
        name: "Second Wind"
        tag: utility
        points: 3
  2:
    pieces:
      - id: action-surge-2
        name: "Action Surge (one use)"
        tag: marquee
        points: 5
      - id: hp-2
        name: "Hit Points (d10)"
        tag: hp
        points: 2
  3:
