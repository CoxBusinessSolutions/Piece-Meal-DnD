# Piece-Meal-DnD — Cleric (Life Domain)
#
# The first CASTER. Adds a spellcasting sub-scheme on top of the martial model:
# progression through the spell-slot table is decomposed into buyable
# upgrade-pieces, chained the same way Sneak Attack tiers are.
#
#   spell-tier-N  : unlocks access to a whole new spell level (marquee).
#                   Chains from the previous tier via `upgrades`.
#   spell-slots-L : incremental slot growth at a level that adds slots but no
#                   new tier (scaling). Chains from the prior slots piece.
#   cantrip-*     : cantrips-known increases (proficiency).
#
# Levels whose only change is repeated slots (12, 14, 16 for a full caster) get
# no spellcasting piece. See README for the full rationale.

class: Cleric
subclass: Life Domain
source: "SRD 5.1 (CC-BY-4.0)"
hit_die: d8
caster: full

xp_thresholds:
  1: 0
  2: 300
  3: 900
  4: 2700
  5: 6500
  6: 14000
  7: 23000
  8: 34000
  9: 48000
  10: 64000
  11: 85000
  12: 100000
  13: 120000
  14: 140000
  15: 165000
  16: 195000
  17: 225000
  18: 265000
  19: 305000
  20: 355000

rubric:
  ribbon: 1
  proficiency: 2
  hp: 2
  utility: 3
  scaling: 3          # an upgrade tier on an existing feature
  slots: 3            # incremental spell-slot growth (spellcasting sub-scheme)
  asi: 4
  marquee: 5
  spellcasting: 5     # unlocking a whole new spell tier

levels:
  1:
    # Character creation: spend the 100-experience budget. Commodities are
    # priced from data/level1_catalog.yaml; the unique features (Spellcasting,
    # Cantrips, Disciple of Life) split whatever is left. Note the Life Domain's
    # heavy-armor grant is folded into the armor commodity so it costs the same
    # heavy-armor price any class pays.
    note: Character-creation budget (100 experience); earned XP starts at 0 in play.
    pieces:
      # --- Commodities (fixed catalog price, shared across classes) ---
      - id: save-wis
        name: "Saving Throw Proficiency: Wisdom"
        commodity: save
      - id: save-cha
        name: "Saving Throw Proficiency: Charisma"
        commodity: save
      - id: skills-1
        name: "Skill Proficiencies (choose 2)"
        commodity: skill
        qty: 2
      - id: hit-die-1
        name: "Hit Die (d8)"
        commodity: hit_die
        variant: d8
      - id: armor-1
        name: "Armor Proficiency: light, medium, heavy (Life Domain), shields"
        commodity: armor
        tiers: [light, medium, heavy, shield]
      - id: weapons-1
        name: "Weapons: simple"
        commodity: weapon
        tier: simple
      - id: starting-kit-1
        name: "Starting Equipment Package"
        commodity: starting_kit
      # --- Unique features (split the remaining budget by points) ---
      - id: spellcasting
        name: "Spellcasting (1st-level spells)"
        tag: spellcasting
        points: 5
      - id: disciple-of-life
        name: "Life Domain: Disciple of Life"
        tag: utility
        points: 3
      - id: cantrips-known-3
