# Piece-Meal-DnD — Paladin (Oath of Devotion)
#
# The first HALF-CASTER. Spellcasting does not begin until level 2, and the
# spell-slot table tops out at 5th level, unlocking a new tier every four class
# levels (1st@2, 2nd@5, 3rd@9, 4th@13, 5th@17). Otherwise it uses the same
# martial upgrade-chains as the Fighter (Extra Attack, aura growth) and the same
# level-1 creation-budget commodity model as everyone else.

class: Paladin
subclass: Oath of Devotion
source: "SRD 5.1 (CC-BY-4.0)"
hit_die: d10
caster: half

xp_thresholds:
  1: 0
  2: 300
  3: 900
  4: 2700
  5: 6500
  6: 14000
  7: 23000
  8: 34000
  9: 48000
  10: 64000
  11: 85000
  12: 100000
  13: 120000
  14: 140000
  15: 165000
  16: 195000
  17: 225000
  18: 265000
  19: 305000
  20: 355000

rubric:
  ribbon: 1
  proficiency: 2
  hp: 2
  utility: 3
  scaling: 3
  slots: 3
  asi: 4
  marquee: 5
  spellcasting: 5

levels:
  1:
    # Character-creation budget (100 experience). No spellcasting yet — a
    # half-caster's magic is bought starting at level 2.
    note: Character-creation budget (100 experience); earned XP starts at 0 in play.
    pieces:
      # --- Commodities (fixed catalog price, shared across classes) ---
      - id: save-wis
        name: "Saving Throw Proficiency: Wisdom"
        commodity: save
      - id: save-cha
        name: "Saving Throw Proficiency: Charisma"
        commodity: save
      - id: skills-1
        name: "Skill Proficiencies (choose 2)"
        commodity: skill
        qty: 2
      - id: hit-die-1
        name: "Hit Die (d10)"
        commodity: hit_die
        variant: d10
      - id: armor-1
        name: "Armor Proficiency: all armor + shields"
        commodity: armor
        tiers: [light, medium, heavy, shield]
      - id: weapons-1
        name: "Weapons: simple + martial"
        commodity: weapon
        tier: simple_and_martial
      - id: starting-kit-1
        name: "Starting Equipment Package"
        commodity: starting_kit
      # --- Unique features (split the remaining budget by points) ---
